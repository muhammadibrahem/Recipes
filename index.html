<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Restaurant Menu</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css">
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="mobile-container">
            <header>
                <div class="header-text">
                    <h1>Restaurant Menu</h1>
                    <p>
                        Browse dishes,
save favorites,
and view menu details.
                    </p>
                </div>
                <div class="search-wrapper">
                    <input type="text" id="search-term" placeholder="Search menu items...">
                    <button id="search" title="Search menu items">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </header>
            <div class="fav-container">
                <h3>Favorite Dishes</h3>
                <ul class="fav-meals" id="fav-meals"></ul>
            </div>
            <div class="menu-list-header">
                <h2>Restaurant Menu</h2>
                <p>Select a dish to view details and add favorites.</p>
            </div>
            <div class="meals" id="meals"></div>
        </div>
        <div class="popup-container hidden" id="meal-popup">
            <div class="popup">
                <button id="close-popup" class="close-popup" title="Close menu detail">
                    <i class="fas fa-times"></i>
                </button>
                <div class="meal-info" id="meal-info"></div>
            </div>
        </div>
    </body>
</html>
